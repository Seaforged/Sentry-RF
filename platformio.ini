; SENTRY-RF PlatformIO Configuration
; Triple-target build: LilyGo T3S3 (SX1262) + Heltec V3 (SX1262) + T3S3 LR1121 (dual-band)

[platformio]
default_envs = t3s3, heltec_v3

[env]
framework = arduino
platform = espressif32
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.0.0
    sparkfun/SparkFun u-blox GNSS v3@^3.1.1
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5

[env:t3s3]
board = lilygo-t3-s3
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_flags =
    -DBOARD_T3S3
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_port = auto

[env:heltec_v3]
board = heltec_wifi_lora_32_V3
build_flags =
    -DBOARD_HELTEC_V3
monitor_port = auto

[env:t3s3_lr1121]
board = lilygo-t3-s3
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_flags =
    -DBOARD_T3S3_LR1121
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_port = auto

[env:lr1121_test]
board = lilygo-t3-s3
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = -<*> +<../test/lr1121_hello/>
lib_deps =
    jgromes/RadioLib@^7.0.0
monitor_port = auto
monitor_dtr = 0
monitor_rts = 0
